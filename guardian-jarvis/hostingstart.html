<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guardian - Under Construction</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at top, #0a0f1f, #000000);
      color: #00ffe1;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }

    .grid {
      position: absolute;
      width: 200%;
      height: 200%;
      background-image: linear-gradient(rgba(0,255,225,0.08) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,255,225,0.08) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: moveGrid 20s linear infinite;
    }

    @keyframes moveGrid {
      0% { transform: translate(0,0); }
      100% { transform: translate(-40px,-40px); }
    }

    .container {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      letter-spacing: 4px;
      text-shadow: 0 0 10px #00ffe1, 0 0 20px #00ffe1;
      animation: flicker 2s infinite;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .tagline {
      margin-top: 10px;
      font-size: 1.2rem;
      color: #7fffe9;
    }

    .terminal {
      margin-top: 30px;
      background: rgba(0,0,0,0.6);
      border: 1px solid #00ffe1;
      padding: 20px;
      width: 80%;
      max-width: 600px;
      text-align: left;
      box-shadow: 0 0 15px #00ffe1;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      background: #00ffe1;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .warning {
      margin-top: 20px;
      color: #ff3b3b;
      font-weight: bold;
      text-shadow: 0 0 10px #ff3b3b;
    }
  </style>
</head>
<body>
  <div class="grid"></div>

  <div class="container">
    <h1>GUARDIAN</h1>
    <div class="tagline">Cyber Defense Intelligence System</div>

    <div class="terminal">
      > initializing core systems...<br />
      > loading threat matrix...<br />
      > syncing neural defense grid...<br />
      > system status: <span style="color:#00ff88">ONLINE (LIMITED)</span><br />
      > deployment stage: <span style="color:#ffaa00">UNDER CONSTRUCTION</span><br />
      > awaiting full activation<span class="cursor">&nbsp;</span>
    </div>

    <div class="warning">⚠ Secure Environment In Development ⚠</div>
  </div>
</body>
</html>
